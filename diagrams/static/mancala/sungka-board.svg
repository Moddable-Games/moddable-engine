<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" width="560" height="180">
  <title>Sungka — starting position (2x7 pits + 2 stores, 7 shells per pit)</title>

  <!-- Boat-shaped board (Filipino sungka — lighter, polished wood) -->
  <ellipse cx="280" cy="90" rx="268" ry="76" fill="#A08050"/>
  <ellipse cx="280" cy="90" rx="260" ry="68" fill="#C4A060"/>

  <!-- Left store (ulo) -->
  <ellipse cx="80" cy="90" rx="20" ry="38" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>

  <!-- Right store (ulo) -->
  <ellipse cx="480" cy="90" rx="20" ry="38" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>

  <!-- Top row pits (7, symmetrically centred) -->
  <g id="top-row">
    <circle cx="120" cy="58" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="173" cy="56" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="227" cy="55" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="280" cy="54" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="333" cy="55" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="387" cy="56" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="440" cy="58" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
  </g>

  <!-- Bottom row pits (7, symmetrically centred) -->
  <g id="bottom-row">
    <circle cx="120" cy="122" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="173" cy="124" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="227" cy="125" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="280" cy="126" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="333" cy="125" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="387" cy="124" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
    <circle cx="440" cy="122" r="18" fill="#6B4C28" stroke="#4A3518" stroke-width="1.5"/>
  </g>

