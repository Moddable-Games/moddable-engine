    <circle cx="433" cy="116" r="3.5"/><circle cx="440" cy="114" r="3.5"/><circle cx="447" cy="116" r="3.5"/>
    <circle cx="436" cy="123" r="3.5"/><circle cx="444" cy="123" r="3.5"/>
    <circle cx="436" cy="130" r="3.5"/><circle cx="444" cy="130" r="3.5"/>
