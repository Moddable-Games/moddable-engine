    <circle cx="113" cy="116" r="3.5"/><circle cx="120" cy="114" r="3.5"/><circle cx="127" cy="116" r="3.5"/>
    <circle cx="116" cy="123" r="3.5"/><circle cx="124" cy="123" r="3.5"/>
    <circle cx="116" cy="130" r="3.5"/><circle cx="124" cy="130" r="3.5"/>

    <circle cx="166" cy="118" r="3.5"/><circle cx="173" cy="116" r="3.5"/><circle cx="180" cy="118" r="3.5"/>
    <circle cx="169" cy="125" r="3.5"/><circle cx="177" cy="125" r="3.5"/>
    <circle cx="169" cy="132" r="3.5"/><circle cx="177" cy="132" r="3.5"/>

    <circle cx="220" cy="119" r="3.5"/><circle cx="227" cy="117" r="3.5"/><circle cx="234" cy="119" r="3.5"/>
    <circle cx="223" cy="126" r="3.5"/><circle cx="231" cy="126" r="3.5"/>
    <circle cx="223" cy="133" r="3.5"/><circle cx="231" cy="133" r="3.5"/>

    <circle cx="273" cy="120" r="3.5"/><circle cx="280" cy="118" r="3.5"/><circle cx="287" cy="120" r="3.5"/>
    <circle cx="276" cy="127" r="3.5"/><circle cx="284" cy="127" r="3.5"/>
    <circle cx="276" cy="134" r="3.5"/><circle cx="284" cy="134" r="3.5"/>

    <circle cx="326" cy="119" r="3.5"/><circle cx="333" cy="117" r="3.5"/><circle cx="340" cy="119" r="3.5"/>
    <circle cx="329" cy="126" r="3.5"/><circle cx="337" cy="126" r="3.5"/>
    <circle cx="329" cy="133" r="3.5"/><circle cx="337" cy="133" r="3.5"/>

    <circle cx="380" cy="118" r="3.5"/><circle cx="387" cy="116" r="3.5"/><circle cx="394" cy="118" r="3.5"/>
