    <circle cx="329" cy="63" r="3.5"/><circle cx="337" cy="63" r="3.5"/>

    <circle cx="380" cy="50" r="3.5"/><circle cx="387" cy="48" r="3.5"/><circle cx="394" cy="50" r="3.5"/>
    <circle cx="383" cy="57" r="3.5"/><circle cx="391" cy="57" r="3.5"/>
    <circle cx="383" cy="64" r="3.5"/><circle cx="391" cy="64" r="3.5"/>

    <circle cx="433" cy="52" r="3.5"/><circle cx="440" cy="50" r="3.5"/><circle cx="447" cy="52" r="3.5"/>
