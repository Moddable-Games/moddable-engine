<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 180" width="470" height="180">
  <title>Ayo — starting position (2x6, 4 seeds per pit, no stores)</title>

  <!-- Wooden board background (darker Nigerian hardwood) -->
  <rect x="10" y="15" width="450" height="150" rx="22" ry="22" fill="#5C3D1E"/>
  <rect x="16" y="21" width="438" height="138" rx="18" ry="18" fill="#7B5530"/>

  <!-- Carved groove border -->
  <rect x="22" y="27" width="426" height="126" rx="14" ry="14" fill="none" stroke="#4A3018" stroke-width="2"/>

  <!-- Top row pits (Player 2) -->
  <g id="top-row">
    <circle cx="70" cy="60" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="136" cy="60" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="202" cy="60" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="268" cy="60" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="334" cy="60" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="400" cy="60" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
  </g>

  <!-- Bottom row pits (Player 1) -->
  <g id="bottom-row">
    <circle cx="70" cy="120" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="136" cy="120" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="202" cy="120" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="268" cy="120" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="334" cy="120" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="400" cy="120" r="24" fill="#3A2210" stroke="#2A1808" stroke-width="1.5"/>
  </g>

  <!-- Seeds (4 per pit, reddish-brown Ayo seeds) -->
  <g fill="#D4A060" stroke="#A07030" stroke-width="0.5">
    <!-- Top row -->
    <circle cx="63" cy="54" r="5"/><circle cx="77" cy="54" r="5"/>
    <circle cx="63" cy="66" r="5"/><circle cx="77" cy="66" r="5"/>
    <circle cx="129" cy="54" r="5"/><circle cx="143" cy="54" r="5"/>
    <circle cx="129" cy="66" r="5"/><circle cx="143" cy="66" r="5"/>
    <circle cx="195" cy="54" r="5"/><circle cx="209" cy="54" r="5"/>
    <circle cx="195" cy="66" r="5"/><circle cx="209" cy="66" r="5"/>
    <circle cx="261" cy="54" r="5"/><circle cx="275" cy="54" r="5"/>
    <circle cx="261" cy="66" r="5"/><circle cx="275" cy="66" r="5"/>
    <circle cx="327" cy="54" r="5"/><circle cx="341" cy="54" r="5"/>
    <circle cx="327" cy="66" r="5"/><circle cx="341" cy="66" r="5"/>
    <circle cx="393" cy="54" r="5"/><circle cx="407" cy="54" r="5"/>
    <circle cx="393" cy="66" r="5"/><circle cx="407" cy="66" r="5"/>
    <!-- Bottom row -->
    <circle cx="63" cy="114" r="5"/><circle cx="77" cy="114" r="5"/>
    <circle cx="63" cy="126" r="5"/><circle cx="77" cy="126" r="5"/>
    <circle cx="129" cy="114" r="5"/><circle cx="143" cy="114" r="5"/>
    <circle cx="129" cy="126" r="5"/><circle cx="143" cy="126" r="5"/>
    <circle cx="195" cy="114" r="5"/><circle cx="209" cy="114" r="5"/>
    <circle cx="195" cy="126" r="5"/><circle cx="209" cy="126" r="5"/>
    <circle cx="261" cy="114" r="5"/><circle cx="275" cy="114" r="5"/>
    <circle cx="261" cy="126" r="5"/><circle cx="275" cy="126" r="5"/>
    <circle cx="327" cy="114" r="5"/><circle cx="341" cy="114" r="5"/>
    <circle cx="327" cy="126" r="5"/><circle cx="341" cy="126" r="5"/>
    <circle cx="393" cy="114" r="5"/><circle cx="407" cy="114" r="5"/>
    <circle cx="393" cy="126" r="5"/><circle cx="407" cy="126" r="5"/>
  </g>
</svg>
