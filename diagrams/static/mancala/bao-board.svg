<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 250" width="560" height="250">
  <title>Bao — 4x8 board (four rows of eight pits)</title>

  <!-- Wooden board background -->
  <rect x="10" y="10" width="540" height="230" rx="18" ry="18" fill="#6B4C28"/>
  <rect x="16" y="16" width="528" height="218" rx="14" ry="14" fill="#8A6538"/>

  <!-- Row 1: Player 2 back row (8 pits, spacing 66px, centred) -->
  <g id="row1">
    <circle cx="49" cy="50" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="115" cy="50" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="181" cy="50" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="247" cy="50" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="313" cy="50" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="379" cy="50" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="445" cy="50" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="511" cy="50" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
  </g>

  <!-- Row 2: Player 2 front row -->
  <g id="row2">
    <circle cx="49" cy="98" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="115" cy="98" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="181" cy="98" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="247" cy="98" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="313" cy="98" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="379" cy="98" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="445" cy="98" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="511" cy="98" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
  </g>

  <!-- Divider between players -->
  <line x1="30" y1="125" x2="544" y2="125" stroke="#554020" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Row 3: Player 1 front row -->
  <g id="row3">
    <circle cx="49" cy="152" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="115" cy="152" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="181" cy="152" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="247" cy="152" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="313" cy="152" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="379" cy="152" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="445" cy="152" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="511" cy="152" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
  </g>

  <!-- Row 4: Player 1 back row -->
  <g id="row4">
    <circle cx="49" cy="200" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="115" cy="200" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="181" cy="200" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="247" cy="200" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="313" cy="200" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="379" cy="200" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="445" cy="200" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
    <circle cx="511" cy="200" r="20" fill="#3E2410" stroke="#2A1808" stroke-width="1.5"/>
  </g>

  <!-- Seeds in front rows (2 per pit) -->
  <g fill="#C8B898" stroke="#8A7A5A" stroke-width="0.5">
    <!-- Row 2 -->
    <circle cx="44" cy="95" r="4"/><circle cx="54" cy="101" r="4"/>
    <circle cx="110" cy="95" r="4"/><circle cx="120" cy="101" r="4"/>
    <circle cx="176" cy="95" r="4"/><circle cx="186" cy="101" r="4"/>
    <circle cx="242" cy="95" r="4"/><circle cx="252" cy="101" r="4"/>
    <circle cx="308" cy="95" r="4"/><circle cx="318" cy="101" r="4"/>
    <circle cx="374" cy="95" r="4"/><circle cx="384" cy="101" r="4"/>
    <circle cx="440" cy="95" r="4"/><circle cx="450" cy="101" r="4"/>
    <circle cx="506" cy="95" r="4"/><circle cx="516" cy="101" r="4"/>
    <!-- Row 3 -->
    <circle cx="44" cy="149" r="4"/><circle cx="54" cy="155" r="4"/>
    <circle cx="110" cy="149" r="4"/><circle cx="120" cy="155" r="4"/>
    <circle cx="176" cy="149" r="4"/><circle cx="186" cy="155" r="4"/>
    <circle cx="242" cy="149" r="4"/><circle cx="252" cy="155" r="4"/>
    <circle cx="308" cy="149" r="4"/><circle cx="318" cy="155" r="4"/>
    <circle cx="374" cy="149" r="4"/><circle cx="384" cy="155" r="4"/>
    <circle cx="440" cy="149" r="4"/><circle cx="450" cy="155" r="4"/>
    <circle cx="506" cy="149" r="4"/><circle cx="516" cy="155" r="4"/>
  </g>

  <!-- Nyumba markers (special pits — 4th from left in each back row) -->
  <circle cx="247" cy="50" r="14" fill="none" stroke="#C49040" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="247" cy="200" r="14" fill="none" stroke="#C49040" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
