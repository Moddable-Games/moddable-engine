<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" aria-label="Halma 16x16 board — 4-player starting position with 13 pieces per camp">
  <defs>
    <pattern id="checker" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="25" height="25" fill="#fdf8f0"/>
      <rect x="25" width="25" height="25" fill="#c9a46e"/>
      <rect y="25" width="25" height="25" fill="#c9a46e"/>
      <rect x="25" y="25" width="25" height="25" fill="#fdf8f0"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#checker)"/>
  <!-- Camp shapes: 4+4+3+2 = 13 per corner -->
  <!-- Camp P1 (bottom-right): rows 16-13 from corner -->
  <!-- Row 16 (y=375): cols 13-16 = 4 -->
  <rect x="300" y="375" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="325" y="375" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
