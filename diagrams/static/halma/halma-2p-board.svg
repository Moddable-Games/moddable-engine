<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" aria-label="Halma 16x16 board — 2-player starting position with 19 pieces per camp">
  <defs>
    <pattern id="checker" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="25" height="25" fill="#fdf8f0"/>
      <rect x="25" width="25" height="25" fill="#c9a46e"/>
      <rect y="25" width="25" height="25" fill="#c9a46e"/>
      <rect x="25" y="25" width="25" height="25" fill="#fdf8f0"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#checker)"/>
  <!-- Camp P1 (bottom-right): columns L-P (12-16), staircase 3+3+4+4+5 from right edge -->
  <!-- Row 16 (y=375): cols 12-16 = 5 squares -->
  <rect x="275" y="375" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="300" y="375" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="325" y="375" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="350" y="375" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="375" y="375" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <!-- Row 15 (y=350): cols 13-16 = 4 squares -->
  <rect x="300" y="350" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="325" y="350" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="350" y="350" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="375" y="350" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <!-- Row 14 (y=325): cols 13-16 = 4 squares -->
  <rect x="300" y="325" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="325" y="325" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="350" y="325" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="375" y="325" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <!-- Row 13 (y=300): cols 14-16 = 3 squares -->
  <rect x="325" y="300" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="350" y="300" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="375" y="300" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <!-- Row 12 (y=275): cols 14-16 = 3 squares -->
  <rect x="325" y="275" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="350" y="275" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <rect x="375" y="275" width="25" height="25" fill="#8b5e3c" opacity="0.22"/>
  <!-- Camp P2 (top-left): columns A-E (1-5), staircase mirror -->
  <!-- Row 1 (y=0): cols 1-5 = 5 squares -->
  <rect x="0" y="0" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="25" y="0" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="50" y="0" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="75" y="0" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="100" y="0" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <!-- Row 2 (y=25): cols 1-4 = 4 squares -->
  <rect x="0" y="25" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="25" y="25" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="50" y="25" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="75" y="25" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <!-- Row 3 (y=50): cols 1-4 = 4 squares -->
  <rect x="0" y="50" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="25" y="50" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="50" y="50" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="75" y="50" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <!-- Row 4 (y=75): cols 1-3 = 3 squares -->
  <rect x="0" y="75" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="25" y="75" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="50" y="75" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <!-- Row 5 (y=100): cols 1-3 = 3 squares -->
  <rect x="0" y="100" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="25" y="100" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <rect x="50" y="100" width="25" height="25" fill="#8b5e3c" opacity="0.14"/>
  <!-- Board border -->
  <rect width="400" height="400" fill="none" stroke="#3b1f0e" stroke-width="2"/>
  <!-- P1 pieces (dark, bottom-right) — 19 pieces filling camp -->
  <!-- Row 16: cols 12-16 -->
  <circle cx="287.5" cy="387.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="312.5" cy="387.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="337.5" cy="387.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="362.5" cy="387.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="387.5" cy="387.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <!-- Row 15: cols 13-16 -->
  <circle cx="312.5" cy="362.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="337.5" cy="362.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="362.5" cy="362.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="387.5" cy="362.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <!-- Row 14: cols 13-16 -->
  <circle cx="312.5" cy="337.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="337.5" cy="337.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="362.5" cy="337.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="387.5" cy="337.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <!-- Row 13: cols 14-16 -->
  <circle cx="337.5" cy="312.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="362.5" cy="312.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="387.5" cy="312.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <!-- Row 12: cols 14-16 -->
  <circle cx="337.5" cy="287.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="362.5" cy="287.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="387.5" cy="287.5" r="8" fill="#5c3310" stroke="#3b1f0e" stroke-width="1.2"/>
  <!-- P2 pieces (light, top-left) — 19 pieces filling camp -->
  <!-- Row 1: cols 1-5 -->
  <circle cx="12.5" cy="12.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="37.5" cy="12.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="62.5" cy="12.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="87.5" cy="12.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="112.5" cy="12.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <!-- Row 2: cols 1-4 -->
  <circle cx="12.5" cy="37.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="37.5" cy="37.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="62.5" cy="37.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="87.5" cy="37.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <!-- Row 3: cols 1-4 -->
  <circle cx="12.5" cy="62.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="37.5" cy="62.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="62.5" cy="62.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="87.5" cy="62.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <!-- Row 4: cols 1-3 -->
  <circle cx="12.5" cy="87.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="37.5" cy="87.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="62.5" cy="87.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <!-- Row 5: cols 1-3 -->
  <circle cx="12.5" cy="112.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="37.5" cy="112.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <circle cx="62.5" cy="112.5" r="8" fill="#fdf8f0" stroke="#3b1f0e" stroke-width="1.2"/>
  <!-- Labels -->
  <text x="335" y="270" font-family="sans-serif" font-size="10" fill="#3b1f0e" font-weight="600" opacity="0.6">Camp P1</text>
  <text x="4" y="135" font-family="sans-serif" font-size="10" fill="#3b1f0e" font-weight="600" opacity="0.6">Camp P2</text>
</svg>
