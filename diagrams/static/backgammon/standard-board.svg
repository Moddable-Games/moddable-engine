<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 320" width="440" height="320">
  <title>Standard Backgammon — starting position</title>

  <defs>
    <symbol id="piece-dark" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="#333" stroke="#111" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="6" fill="none" stroke="#555" stroke-width="0.8"/>
    </symbol>
    <symbol id="piece-light" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="#eee" stroke="#999" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="6" fill="none" stroke="#ccc" stroke-width="0.8"/>
    </symbol>
  </defs>

  <!-- Outer board frame (wood) -->
  <rect x="0" y="0" width="440" height="320" rx="6" ry="6" fill="#3d2b1f"/>

  <!-- Playing surface left half -->
  <rect x="16" y="16" width="192" height="288" fill="#1a5c3a"/>
  <!-- Playing surface right half -->
  <rect x="232" y="16" width="192" height="288" fill="#1a5c3a"/>

  <!-- Bar (centre divider) -->
  <rect x="208" y="0" width="24" height="320" fill="#3d2b1f"/>

  <!-- Bottom points (1-12, right to left): points 1-6 right half, 7-12 left half -->
  <!-- Point 1 (bottom-right) to Point 6 -->
  <g id="bottom-right-points">
    <polygon points="392,304 424,304 408,184" fill="#c47e3b"/>
    <polygon points="360,304 392,304 376,184" fill="#8b2500"/>
    <polygon points="328,304 360,304 344,184" fill="#c47e3b"/>
    <polygon points="296,304 328,304 312,184" fill="#8b2500"/>
    <polygon points="264,304 296,304 280,184" fill="#c47e3b"/>
    <polygon points="232,304 264,304 248,184" fill="#8b2500"/>
  </g>

  <!-- Point 7 to Point 12 (bottom-left) -->
  <g id="bottom-left-points">
    <polygon points="176,304 208,304 192,184" fill="#c47e3b"/>
    <polygon points="144,304 176,304 160,184" fill="#8b2500"/>
    <polygon points="112,304 144,304 128,184" fill="#c47e3b"/>
    <polygon points="80,304 112,304 96,184" fill="#8b2500"/>
    <polygon points="48,304 80,304 64,184" fill="#c47e3b"/>
    <polygon points="16,304 48,304 32,184" fill="#8b2500"/>
  </g>

  <!-- Top points (13-24, left to right): points 13-18 left half, 19-24 right half -->
  <g id="top-left-points">
    <polygon points="16,16 48,16 32,136" fill="#8b2500"/>
    <polygon points="48,16 80,16 64,136" fill="#c47e3b"/>
    <polygon points="80,16 112,16 96,136" fill="#8b2500"/>
    <polygon points="112,16 144,16 128,136" fill="#c47e3b"/>
    <polygon points="144,16 176,16 160,136" fill="#8b2500"/>
    <polygon points="176,16 208,16 192,136" fill="#c47e3b"/>
  </g>

  <g id="top-right-points">
    <polygon points="232,16 264,16 248,136" fill="#8b2500"/>
    <polygon points="264,16 296,16 280,136" fill="#c47e3b"/>
    <polygon points="296,16 328,16 312,136" fill="#8b2500"/>
    <polygon points="328,16 360,16 344,136" fill="#c47e3b"/>
    <polygon points="360,16 392,16 376,136" fill="#8b2500"/>
    <polygon points="392,16 424,16 408,136" fill="#c47e3b"/>
  </g>

  <!-- Dark pieces (15 total): 2 on point 24, 5 on point 13, 3 on point 8, 5 on point 6 -->
  <g id="dark-pieces">
    <!-- Point 24 (top-right, rightmost): 2 pieces stacking down from top -->
    <use href="#piece-dark" x="396" y="18" width="24" height="24"/>
    <use href="#piece-dark" x="396" y="40" width="24" height="24"/>
    <!-- Point 13 (top-left, leftmost): 5 pieces stacking down from top -->
    <use href="#piece-dark" x="20" y="18" width="24" height="24"/>
    <use href="#piece-dark" x="20" y="40" width="24" height="24"/>
    <use href="#piece-dark" x="20" y="62" width="24" height="24"/>
    <use href="#piece-dark" x="20" y="84" width="24" height="24"/>
    <use href="#piece-dark" x="20" y="106" width="24" height="24"/>
    <!-- Point 8 (bottom-left, 2nd from right): 3 pieces stacking up from bottom -->
    <use href="#piece-dark" x="148" y="278" width="24" height="24"/>
    <use href="#piece-dark" x="148" y="256" width="24" height="24"/>
    <use href="#piece-dark" x="148" y="234" width="24" height="24"/>
    <!-- Point 6 (bottom-right, leftmost): 5 pieces stacking up from bottom -->
    <use href="#piece-dark" x="236" y="278" width="24" height="24"/>
    <use href="#piece-dark" x="236" y="256" width="24" height="24"/>
    <use href="#piece-dark" x="236" y="234" width="24" height="24"/>
    <use href="#piece-dark" x="236" y="212" width="24" height="24"/>
    <use href="#piece-dark" x="236" y="190" width="24" height="24"/>
  </g>

  <!-- Light pieces (15 total): 2 on point 1, 5 on point 12, 3 on point 17, 5 on point 19 -->
  <g id="light-pieces">
    <!-- Point 1 (bottom-right, rightmost): 2 pieces stacking up from bottom -->
    <use href="#piece-light" x="396" y="278" width="24" height="24"/>
    <use href="#piece-light" x="396" y="256" width="24" height="24"/>
    <!-- Point 12 (bottom-left, leftmost): 5 pieces stacking up from bottom -->
    <use href="#piece-light" x="20" y="278" width="24" height="24"/>
    <use href="#piece-light" x="20" y="256" width="24" height="24"/>
    <use href="#piece-light" x="20" y="234" width="24" height="24"/>
    <use href="#piece-light" x="20" y="212" width="24" height="24"/>
    <use href="#piece-light" x="20" y="190" width="24" height="24"/>
    <!-- Point 17 (top-left, 5th from left): 3 pieces stacking down from top -->
    <use href="#piece-light" x="148" y="18" width="24" height="24"/>
    <use href="#piece-light" x="148" y="40" width="24" height="24"/>
    <use href="#piece-light" x="148" y="62" width="24" height="24"/>
    <!-- Point 19 (top-right, leftmost): 5 pieces stacking down from top -->
    <use href="#piece-light" x="236" y="18" width="24" height="24"/>
    <use href="#piece-light" x="236" y="40" width="24" height="24"/>
    <use href="#piece-light" x="236" y="62" width="24" height="24"/>
    <use href="#piece-light" x="236" y="84" width="24" height="24"/>
    <use href="#piece-light" x="236" y="106" width="24" height="24"/>
  </g>

  <!-- Point numbers -->
  <g font-family="sans-serif" font-size="8" text-anchor="middle" fill="#a08060">
    <!-- Bottom points 1-6 (right to left in right half) -->
    <text x="408" y="314">1</text>
    <text x="376" y="314">2</text>
    <text x="344" y="314">3</text>
    <text x="312" y="314">4</text>
    <text x="280" y="314">5</text>
    <text x="248" y="314">6</text>
    <!-- Bottom points 7-12 (right to left in left half) -->
    <text x="192" y="314">7</text>
    <text x="160" y="314">8</text>
    <text x="128" y="314">9</text>
    <text x="96" y="314">10</text>
    <text x="64" y="314">11</text>
    <text x="32" y="314">12</text>
    <!-- Top points 13-18 (left to right in left half) -->
    <text x="32" y="12">13</text>
    <text x="64" y="12">14</text>
    <text x="96" y="12">15</text>
    <text x="128" y="12">16</text>
    <text x="160" y="12">17</text>
    <text x="192" y="12">18</text>
    <!-- Top points 19-24 (left to right in right half) -->
    <text x="248" y="12">19</text>
    <text x="280" y="12">20</text>
    <text x="312" y="12">21</text>
    <text x="344" y="12">22</text>
    <text x="376" y="12">23</text>
    <text x="408" y="12">24</text>
  </g>
</svg>
