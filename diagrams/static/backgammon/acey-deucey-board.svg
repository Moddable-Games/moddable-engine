<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 320" width="440" height="320">
  <title>Acey-Deucey — empty board (pieces enter during play)</title>

  <defs>
    <!-- Arrow marker for entry direction -->
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#a08060"/>
    </marker>
  </defs>

  <!-- Outer board frame (wood) -->
  <rect x="0" y="0" width="440" height="320" rx="6" ry="6" fill="#3d2b1f"/>

  <!-- Playing surface left half -->
  <rect x="16" y="16" width="192" height="288" fill="#1a5c3a"/>
  <!-- Playing surface right half -->
  <rect x="232" y="16" width="192" height="288" fill="#1a5c3a"/>

  <!-- Bar (centre divider) -->
  <rect x="208" y="0" width="24" height="320" fill="#3d2b1f"/>

  <!-- Bottom points (1-12, right to left) -->
  <g id="bottom-right-points">
    <polygon points="392,304 424,304 408,184" fill="#c47e3b"/>
    <polygon points="360,304 392,304 376,184" fill="#8b2500"/>
    <polygon points="328,304 360,304 344,184" fill="#c47e3b"/>
    <polygon points="296,304 328,304 312,184" fill="#8b2500"/>
    <polygon points="264,304 296,304 280,184" fill="#c47e3b"/>
    <polygon points="232,304 264,304 248,184" fill="#8b2500"/>
  </g>

  <g id="bottom-left-points">
    <polygon points="176,304 208,304 192,184" fill="#c47e3b"/>
    <polygon points="144,304 176,304 160,184" fill="#8b2500"/>
    <polygon points="112,304 144,304 128,184" fill="#c47e3b"/>
    <polygon points="80,304 112,304 96,184" fill="#8b2500"/>
    <polygon points="48,304 80,304 64,184" fill="#c47e3b"/>
    <polygon points="16,304 48,304 32,184" fill="#8b2500"/>
  </g>

  <!-- Top points (13-24, left to right) -->
  <g id="top-left-points">
    <polygon points="16,16 48,16 32,136" fill="#8b2500"/>
    <polygon points="48,16 80,16 64,136" fill="#c47e3b"/>
    <polygon points="80,16 112,16 96,136" fill="#8b2500"/>
    <polygon points="112,16 144,16 128,136" fill="#c47e3b"/>
    <polygon points="144,16 176,16 160,136" fill="#8b2500"/>
    <polygon points="176,16 208,16 192,136" fill="#c47e3b"/>
  </g>

  <g id="top-right-points">
    <polygon points="232,16 264,16 248,136" fill="#8b2500"/>
    <polygon points="264,16 296,16 280,136" fill="#c47e3b"/>
    <polygon points="296,16 328,16 312,136" fill="#8b2500"/>
    <polygon points="328,16 360,16 344,136" fill="#c47e3b"/>
    <polygon points="360,16 392,16 376,136" fill="#8b2500"/>
    <polygon points="392,16 424,16 408,136" fill="#c47e3b"/>
  </g>

  <!-- Off-board piece stacks showing pieces waiting to enter -->
  <!-- Dark pieces off-board (right side, above board) -->
  <g id="dark-off-board" opacity="0.5">
    <circle cx="435" cy="290" r="6" fill="#333" stroke="#111" stroke-width="1"/>
    <circle cx="435" cy="278" r="6" fill="#333" stroke="#111" stroke-width="1"/>
    <circle cx="435" cy="266" r="6" fill="#333" stroke="#111" stroke-width="1"/>
    <rect x="429" y="248" width="12" height="12" rx="2" fill="#333" stroke="#555" stroke-width="0.5"/>
    <text x="435" y="257" font-family="sans-serif" font-size="7" text-anchor="middle" fill="#fff">15</text>
  </g>

  <!-- Light pieces off-board (right side, below board top) -->
  <g id="light-off-board" opacity="0.5">
    <circle cx="435" cy="30" r="6" fill="#eee" stroke="#999" stroke-width="1"/>
    <circle cx="435" cy="42" r="6" fill="#eee" stroke="#999" stroke-width="1"/>
    <circle cx="435" cy="54" r="6" fill="#eee" stroke="#999" stroke-width="1"/>
    <rect x="429" y="62" width="12" height="12" rx="2" fill="#eee" stroke="#999" stroke-width="0.5"/>
    <text x="435" y="71" font-family="sans-serif" font-size="7" text-anchor="middle" fill="#333">15</text>
  </g>

  <!-- Entry direction arrows -->
  <g fill="none" stroke="#a08060" stroke-width="1.5" opacity="0.8" marker-end="url(#arrowhead)">
    <!-- Dark enters from opponent's home (top-right, points 19-24) -->
    <path d="M 430,240 C 430,200 420,180 408,170"/>
    <!-- Light enters from opponent's home (bottom-right, points 1-6) -->
    <path d="M 430,80 C 430,120 420,140 408,150"/>
  </g>

  <!-- Entry labels -->
  <g font-family="sans-serif" font-size="7" fill="#a08060" opacity="0.8">
    <text x="370" y="160" text-anchor="middle">Dark enters 19-24</text>
    <text x="370" y="172" text-anchor="middle">Light enters 1-6</text>
  </g>

  <!-- Point numbers -->
  <g font-family="sans-serif" font-size="8" text-anchor="middle" fill="#a08060">
    <text x="408" y="314">1</text>
    <text x="376" y="314">2</text>
    <text x="344" y="314">3</text>
    <text x="312" y="314">4</text>
    <text x="280" y="314">5</text>
    <text x="248" y="314">6</text>
    <text x="192" y="314">7</text>
    <text x="160" y="314">8</text>
    <text x="128" y="314">9</text>
    <text x="96" y="314">10</text>
    <text x="64" y="314">11</text>
    <text x="32" y="314">12</text>
    <text x="32" y="12">13</text>
    <text x="64" y="12">14</text>
    <text x="96" y="12">15</text>
    <text x="128" y="12">16</text>
    <text x="160" y="12">17</text>
    <text x="192" y="12">18</text>
    <text x="248" y="12">19</text>
    <text x="280" y="12">20</text>
    <text x="312" y="12">21</text>
    <text x="344" y="12">22</text>
    <text x="376" y="12">23</text>
    <text x="408" y="12">24</text>
  </g>
</svg>
