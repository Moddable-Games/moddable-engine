  <rect x="20" y="202" width="80" height="51" class="lot-bg"/>
  <rect x="20" y="202" width="80" height="51" class="cell-border"/>
  <text x="60" y="225" class="label">Fifth</text>
  <text x="60" y="237" class="label">Avenue</text>
  <text x="60" y="250" class="price">$100</text>

