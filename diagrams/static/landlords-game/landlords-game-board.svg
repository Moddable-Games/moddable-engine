  <rect x="253" y="560" width="51" height="80" class="cell-border"/>
  <text x="278.5" y="600" class="label">Food</text>
  <text x="278.5" y="614" class="label-sm">(Necessity)</text>

  <!-- Pos 6: Royal Rusher R.R. -->
  <rect x="304" y="560" width="51" height="80" class="rr-bg"/>
  <rect x="304" y="560" width="51" height="80" class="cell-border"/>
  <text x="329.5" y="593" class="label">Royal</text>
  <text x="329.5" y="604" class="label">Rusher</text>
  <text x="329.5" y="615" class="label">R.R.</text>
  <text x="329.5" y="629" class="price">$5 fare</text>

  <!-- Pos 7: Lonely Lane ($25) -->
  <rect x="355" y="560" width="51" height="80" class="lot-bg"/>
  <rect x="355" y="560" width="51" height="80" class="cell-border"/>
  <text x="380.5" y="596" class="label">Lonely</text>
  <text x="380.5" y="607" class="label">Lane</text>
  <text x="380.5" y="622" class="price">$25</text>

  <!-- Pos 8: Beggarman's Court ($50) -->
  <rect x="406" y="560" width="51" height="80" class="lot-bg"/>
  <rect x="406" y="560" width="51" height="80" class="cell-border"/>
  <text x="431.5" y="590" class="label">Beggar-</text>
  <text x="431.5" y="601" class="label">man's</text>
  <text x="431.5" y="612" class="label">Court</text>
  <text x="431.5" y="626" class="price">$50</text>

  <!-- Pos 9: Soakum Lighting (Franchise) -->
  <rect x="457" y="560" width="51" height="80" class="franchise-bg"/>
  <rect x="457" y="560" width="51" height="80" class="cell-border"/>
  <text x="482.5" y="590" class="label">Soakum</text>
  <text x="482.5" y="601" class="label">Lighting</text>
  <text x="482.5" y="612" class="label">System</text>
  <text x="482.5" y="626" class="price">$5</text>

  <!-- Pos 10: The Bowery ($75) -->
  <rect x="508" y="560" width="52" height="80" class="lot-bg"/>
  <rect x="508" y="560" width="52" height="80" class="cell-border"/>
  <text x="534" y="596" class="label">The</text>
  <text x="534" y="607" class="label">Bowery</text>
  <text x="534" y="622" class="price">$75</text>

  <!-- Right column (positions 12-20, bottom to top) -->
  <!-- Each cell is 80px wide x ~51px tall -->

  <!-- Pos 12: Boomtown ($50) -->
  <rect x="560" y="509" width="80" height="51" class="lot-bg"/>
  <rect x="560" y="509" width="80" height="51" class="cell-border"/>
  <text x="600" y="535" class="label">Boomtown</text>
  <text x="600" y="548" class="price">$50</text>

  <!-- Pos 13: Fuel (Necessity) -->
  <rect x="560" y="458" width="80" height="51" class="necessity-bg"/>
  <rect x="560" y="458" width="80" height="51" class="cell-border"/>
  <text x="600" y="485" class="label">Fuel</text>
  <text x="600" y="498" class="label-sm">(Necessity)</text>

  <!-- Pos 14: Fairhope Avenue ($75) -->
  <rect x="560" y="407" width="80" height="51" class="lot-bg"/>
  <rect x="560" y="407" width="80" height="51" class="cell-border"/>
  <text x="600" y="430" class="label">Fairhope</text>
  <text x="600" y="441" class="label">Avenue</text>
  <text x="600" y="454" class="price">$75</text>

