  <text x="125.5" y="607" class="label">Pike</text>
  <text x="125.5" y="622" class="price">$25</text>

  <!-- Pos 3: Chance -->
  <rect x="151" y="560" width="51" height="80" class="chance-bg"/>
  <rect x="151" y="560" width="51" height="80" class="cell-border"/>
  <text x="176.5" y="604" class="label">Chance</text>

  <!-- Pos 4: Goat Alley ($50) -->
  <rect x="202" y="560" width="51" height="80" class="lot-bg"/>
  <rect x="202" y="560" width="51" height="80" class="cell-border"/>
  <text x="227.5" y="596" class="label">Goat</text>
  <text x="227.5" y="607" class="label">Alley</text>
  <text x="227.5" y="622" class="price">$50</text>

