  <rect x="152" y="20" width="51" height="80" class="lot-bg"/>
  <rect x="152" y="20" width="51" height="80" class="cell-border"/>
  <text x="177.5" y="52" class="label">Wall</text>
  <text x="177.5" y="63" class="label">Street</text>
  <text x="177.5" y="78" class="price">$100</text>

