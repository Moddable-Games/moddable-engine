  <rect x="254" y="20" width="51" height="80" class="lot-bg"/>
  <rect x="254" y="20" width="51" height="80" class="cell-border"/>
  <text x="279.5" y="48" class="label">Grand</text>
  <text x="279.5" y="60" class="label">Blvd</text>
  <text x="279.5" y="76" class="price">$100</text>

