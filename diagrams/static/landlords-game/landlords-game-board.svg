  <rect x="560" y="356" width="80" height="51" class="chance-bg"/>
  <rect x="560" y="356" width="80" height="51" class="cell-border"/>
  <text x="600" y="385" class="label">Chance</text>

  <!-- Pos 16: Gee Whiz R.R. -->
  <rect x="560" y="305" width="80" height="51" class="rr-bg"/>
  <rect x="560" y="305" width="80" height="51" class="cell-border"/>
  <text x="600" y="327" class="label">Gee Whiz</text>
  <text x="600" y="339" class="label">R.R.</text>
  <text x="600" y="352" class="price">$5 fare</text>

