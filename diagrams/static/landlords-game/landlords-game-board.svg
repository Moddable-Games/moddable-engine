  <rect x="356" y="20" width="51" height="80" class="necessity-bg"/>
  <rect x="356" y="20" width="51" height="80" class="cell-border"/>
  <text x="381.5" y="56" class="label">Shelter</text>
  <text x="381.5" y="70" class="label-sm">(Necessity)</text>

  <!-- Pos 26: Shooting Star R.R. -->
  <rect x="305" y="20" width="51" height="80" class="rr-bg"/>
  <rect x="305" y="20" width="51" height="80" class="cell-border"/>
  <text x="330.5" y="48" class="label">Shooting</text>
  <text x="330.5" y="60" class="label">Star R.R.</text>
  <text x="330.5" y="76" class="price">$5 fare</text>

