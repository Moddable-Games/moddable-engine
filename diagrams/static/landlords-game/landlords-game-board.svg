  <rect x="407" y="20" width="51" height="80" class="lot-bg"/>
  <rect x="407" y="20" width="51" height="80" class="cell-border"/>
  <text x="432.5" y="52" class="label">Market</text>
  <text x="432.5" y="63" class="label">Place</text>
  <text x="432.5" y="78" class="price">$50</text>

