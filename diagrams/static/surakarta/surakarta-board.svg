<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 860" width="900" height="860">
  <title>Surakarta board — 6×6 grid with 8 corner loop arcs</title>
  <rect width="900" height="860" fill="#f5f4ef"/>

  <!-- Title -->
  <text x="450" y="38" font-family="'Inter Tight',Inter,sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#14161c" letter-spacing="2">SURAKARTA</text>
  <text x="450" y="60" font-family="Inter,sans-serif" font-size="12" text-anchor="middle" fill="#55534f">Starting position · 6×6 grid with corner loop arcs</text>

  <!-- Grid origin: centred at (450, 430). Grid spans 400px (5 gaps × 80px). x: 250–650, y: 230–630 -->

  <!-- Column labels A–F -->
  <text x="250" y="215" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">A</text>
  <text x="330" y="215" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">B</text>
  <text x="410" y="215" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">C</text>
  <text x="490" y="215" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">D</text>
  <text x="570" y="215" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">E</text>
  <text x="650" y="215" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">F</text>

  <!-- Row labels 1–6 -->
  <text x="218" y="235" text-anchor="middle" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">1</text>
  <text x="218" y="315" text-anchor="middle" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">2</text>
  <text x="218" y="395" text-anchor="middle" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">3</text>
  <text x="218" y="475" text-anchor="middle" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">4</text>
  <text x="218" y="555" text-anchor="middle" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">5</text>
  <text x="218" y="635" text-anchor="middle" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="14" fill="#888">6</text>

  <!-- Grid horizontal lines -->
  <line x1="250" y1="230" x2="650" y2="230" stroke="#14161c" stroke-width="1.5"/>
  <line x1="250" y1="310" x2="650" y2="310" stroke="#14161c" stroke-width="1.5"/>
  <line x1="250" y1="390" x2="650" y2="390" stroke="#14161c" stroke-width="1.5"/>
  <line x1="250" y1="470" x2="650" y2="470" stroke="#14161c" stroke-width="1.5"/>
  <line x1="250" y1="550" x2="650" y2="550" stroke="#14161c" stroke-width="1.5"/>
  <line x1="250" y1="630" x2="650" y2="630" stroke="#14161c" stroke-width="1.5"/>

  <!-- Grid vertical lines -->
  <line x1="250" y1="230" x2="250" y2="630" stroke="#14161c" stroke-width="1.5"/>
  <line x1="330" y1="230" x2="330" y2="630" stroke="#14161c" stroke-width="1.5"/>
  <line x1="410" y1="230" x2="410" y2="630" stroke="#14161c" stroke-width="1.5"/>
  <line x1="490" y1="230" x2="490" y2="630" stroke="#14161c" stroke-width="1.5"/>
  <line x1="570" y1="230" x2="570" y2="630" stroke="#14161c" stroke-width="1.5"/>
  <line x1="650" y1="230" x2="650" y2="630" stroke="#14161c" stroke-width="1.5"/>

  <!-- Inner loop arcs (blue, r=80) connecting 2nd intersections from each corner -->
  <path d="M 330,230 A 80,80 0 1,0 250,310" fill="none" stroke="#0c4f8d" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 570,230 A 80,80 0 1,1 650,310" fill="none" stroke="#0c4f8d" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 250,550 A 80,80 0 1,0 330,630" fill="none" stroke="#0c4f8d" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 650,550 A 80,80 0 1,1 570,630" fill="none" stroke="#0c4f8d" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Outer loop arcs (red, r=160) connecting 3rd intersections from each corner -->
  <path d="M 410,230 A 160,160 0 1,0 250,390" fill="none" stroke="#d11a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 490,230 A 160,160 0 1,1 650,390" fill="none" stroke="#d11a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 250,470 A 160,160 0 1,0 410,630" fill="none" stroke="#d11a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 650,470 A 160,160 0 1,1 490,630" fill="none" stroke="#d11a1a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Dark pieces: rows 1–2 -->
  <circle cx="250" cy="230" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="330" cy="230" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="410" cy="230" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="490" cy="230" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="570" cy="230" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="650" cy="230" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="250" cy="310" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="330" cy="310" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="410" cy="310" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="490" cy="310" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="570" cy="310" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>
  <circle cx="650" cy="310" r="20" fill="#14161c" stroke="#f5f4ef" stroke-width="1.5"/>

  <!-- Empty intersection dots: rows 3–4 -->
  <circle cx="250" cy="390" r="4" fill="#14161c"/>
  <circle cx="330" cy="390" r="4" fill="#14161c"/>
  <circle cx="410" cy="390" r="4" fill="#14161c"/>
  <circle cx="490" cy="390" r="4" fill="#14161c"/>
  <circle cx="570" cy="390" r="4" fill="#14161c"/>
  <circle cx="650" cy="390" r="4" fill="#14161c"/>
  <circle cx="250" cy="470" r="4" fill="#14161c"/>
  <circle cx="330" cy="470" r="4" fill="#14161c"/>
  <circle cx="410" cy="470" r="4" fill="#14161c"/>
  <circle cx="490" cy="470" r="4" fill="#14161c"/>
  <circle cx="570" cy="470" r="4" fill="#14161c"/>
  <circle cx="650" cy="470" r="4" fill="#14161c"/>

  <!-- Light pieces: rows 5–6 -->
  <circle cx="250" cy="550" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="330" cy="550" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="410" cy="550" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="490" cy="550" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="570" cy="550" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="650" cy="550" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="250" cy="630" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="330" cy="630" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="410" cy="630" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="490" cy="630" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="570" cy="630" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>
  <circle cx="650" cy="630" r="20" fill="#e8e5d8" stroke="#14161c" stroke-width="1.5"/>

  <!-- Legend (single line, centred) -->
  <line x1="310" y1="810" x2="350" y2="810" stroke="#0c4f8d" stroke-width="2.5" stroke-linecap="round"/>
  <text x="358" y="815" font-family="Inter,sans-serif" font-size="14" fill="#14161c">Inner loop</text>
  <line x1="470" y1="810" x2="510" y2="810" stroke="#d11a1a" stroke-width="2.5" stroke-linecap="round"/>
  <text x="518" y="815" font-family="Inter,sans-serif" font-size="14" fill="#14161c">Outer loop</text>
</svg>
