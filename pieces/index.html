<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Piece Gallery — Moddable Engine</title>
<meta name="description" content="96 piece sets across 13 game families. Chess, shogi, xiangqi, draughts, reversi, go, backgammon, mancala, and more.">
<meta name="theme-color" content="#0a0d2a">
<meta name="base-path" content="..">
<link rel="stylesheet" href="../css/home.css">
<link rel="stylesheet" href="../css/gallery.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="../" class="header-brand">
      <span class="brand-icon">&#x2B22;</span>
      <span class="brand-text">moddable<span class="brand-accent">.engine</span></span>
    </a>
    <nav class="header-nav">
      <a href="../play/" class="nav-link nav-link--soon">Play</a>
      <a href="../boards/" class="nav-link nav-link--soon">Boards</a>
      <a href="./" class="nav-link nav-link--active">Pieces</a>
      <a href="../docs/" class="nav-link nav-link--soon">Docs</a>
      <a href="https://github.com/Moddable-Games/moddable-engine" class="nav-link nav-link--gh" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>
</header>

<section class="gallery-hero">
  <div class="gallery-hero-content">
    <div class="hero-eyebrow">Piece Gallery</div>
    <h1 class="hero-title">Every piece. Every set.</h1>
    <p class="hero-lede" id="gallery-intro">Loading...</p>
  </div>
</section>

<section class="gallery-controls">
  <div class="controls-inner">
    <div class="control-row">
      <label class="control-group">
        <span class="control-label">Search</span>
        <input type="text" id="search-input" placeholder="king, elephant, pawn...">
      </label>
      <label class="control-group">
        <span class="control-label">View</span>
        <select id="view-select">
          <option value="by-set">By set</option>
          <option value="by-piece">By piece type</option>
        </select>
      </label>
      <label class="control-group">
        <span class="control-label">Family</span>
        <select id="family-filter">
          <option value="all">All families</option>
        </select>
      </label>
      <label class="control-group">
        <span class="control-label">Set</span>
        <select id="set-filter">
          <option value="all">All sets</option>
        </select>
      </label>
      <label class="control-group">
        <span class="control-label">Background</span>
        <select id="bg-select">
          <option value="checkered">Checkered</option>
          <option value="light">Light square</option>
          <option value="dark">Dark square</option>
          <option value="none">None</option>
        </select>
      </label>
      <label class="control-group">
        <span class="control-label">Size</span>
        <select id="size-select">
          <option value="40">40px</option>
          <option value="56" selected>56px</option>
          <option value="72">72px</option>
          <option value="96">96px</option>
          <option value="120">120px</option>
        </select>
      </label>
    </div>
    <div class="gallery-stats" id="gallery-stats"></div>
  </div>
</section>

<section class="gallery-body">
  <div id="gallery-container"></div>
</section>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-brand">moddable.engine</p>
    <p class="footer-sub">Part of <a href="https://moddable.games" target="_blank" rel="noopener">Moddable.Games</a></p>
  </div>
</footer>

<script type="module" src="../js/gallery.js"></script>
</body>
</html>
