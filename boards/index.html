<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Board Gallery — Moddable Engine</title>
<meta name="description" content="Browse, preview, and download board diagrams for every game variant. SVG and PNG export for all boards.">
<meta property="og:title" content="Board Gallery — Moddable Engine">
<meta property="og:description" content="Browse, preview, and download board diagrams for every game variant. SVG and PNG export for all boards.">
<meta property="og:image" content="https://engine.moddable.games/og/boards.png?v=1.0.5">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://engine.moddable.games/boards/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Moddable Engine">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Board Gallery — Moddable Engine">
<meta name="twitter:description" content="Browse, preview, and download board diagrams for every game variant. SVG and PNG export for all boards.">
<meta name="twitter:image" content="https://engine.moddable.games/og/boards.png?v=1.0.5">
<meta name="theme-color" content="#0a0d2a">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<meta name="base-path" content="..">
<link rel="stylesheet" href="../css/home.css?v=1.0.5">
<link rel="stylesheet" href="../css/gallery.css?v=1.0.5">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="../" class="header-brand">
      <span class="brand-icon">&#x2B22;</span>
      <span class="brand-text">moddable<span class="brand-accent">.engine</span></span>
    </a>
    <nav class="header-nav">
      <a href="../play/" class="nav-link">Play</a>
      <a href="../create/" class="nav-link">Create</a>
      <a href="./" class="nav-link nav-link--active">Boards</a>
      <a href="../pieces/" class="nav-link">Pieces</a>
      <a href="../tiles/" class="nav-link">Tiles</a>
      <a href="../docs/" class="nav-link">Docs</a>
      <a href="https://github.com/Moddable-Games/moddable-engine" class="nav-link nav-link--gh" target="_blank" rel="noopener">GitHub</a>
    </nav>
    <button class="nav-toggle" aria-label="Toggle navigation" onclick="this.classList.toggle('active');this.previousElementSibling.classList.toggle('open')"><span></span><span></span><span></span></button>
  </div>
</header>

<section class="gallery-hero">
  <div class="gallery-hero-content">
    <div class="hero-eyebrow">Board Gallery</div>
    <h1 class="hero-title">Every board. Every variant.</h1>
    <p class="hero-lede" id="gallery-intro">Loading...</p>
  </div>
</section>

<section class="gallery-controls">
  <div class="controls-inner">
    <button class="filters-toggle" onclick="this.classList.toggle('active');this.nextElementSibling.classList.toggle('open')">Filters</button>
    <div class="control-row">
      <label class="control-group">
        <span class="control-label">Search</span>
        <input type="text" id="search-input" placeholder="chess, hex, mancala...">
      </label>
      <label class="control-group">
        <span class="control-label">Family</span>
        <select id="family-filter">
          <option value="all">All families</option>
        </select>
      </label>
      <label class="control-group">
        <span class="control-label">Topology</span>
        <select id="topology-filter">
          <option value="all">All topologies</option>
          <option value="grid">Grid</option>
          <option value="hex">Hex</option>
          <option value="graph">Graph</option>
          <option value="track">Track</option>
          <option value="pit">Pit</option>
        </select>
      </label>
      <label class="control-group">
        <span class="control-label">Size</span>
        <select id="size-select">
          <option value="160">Small</option>
          <option value="240" selected>Medium</option>
          <option value="360">Large</option>
          <option value="full">Full</option>
        </select>
      </label>
    </div>
    <div class="gallery-stats" id="gallery-stats"></div>
  </div>
</section>

<section class="gallery-body">
  <div id="gallery-container"></div>
</section>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-brand">moddable.engine</p>
    <p class="footer-sub">Part of <a href="https://moddable.games" target="_blank" rel="noopener">Moddable.Games</a></p>
  </div>
</footer>

<script type="module" src="../js/boards.js?v=1.0.5"></script>
</body>
</html>
