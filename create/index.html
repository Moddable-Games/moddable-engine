  </div>
</header>

<div class="boards-app">
  <aside class="boards-sidebar">
    <div class="sidebar-panel active">

      <div class="control-group">
        <label class="control-label">Topology</label>
        <select id="topo-type">
          <option value="grid">Grid</option>
          <option value="hex">Hex</option>
          <option value="graph">Graph</option>
          <option value="track">Track</option>
          <option value="pit">Pit</option>
        </select>
      </div>

      <div class="control-group" id="grid-opts">
        <label class="control-label">Rows × Cols</label>
        <div class="control-row">
          <input type="number" id="grid-rows" value="8" min="2" max="36">
          <input type="number" id="grid-cols" value="8" min="2" max="36">
        </div>
      </div>

      <div class="control-group" id="hex-opts" style="display:none">
        <label class="control-label">Radius</label>
        <input type="number" id="hex-radius" value="5" min="2" max="15">
      </div>

      <div class="control-group" id="graph-opts" style="display:none">
        <label class="control-label">Structure</label>
        <select id="graph-structure">
          <option value="concentric-rings">Concentric rings</option>
          <option value="perimeter-cross">Perimeter cross</option>
          <option value="grid-cross">Grid cross</option>
        </select>
        <label class="control-label" style="margin-top:8px">Rings</label>
        <input type="number" id="graph-rings" value="3" min="2" max="5">
      </div>

      <div class="control-group" id="track-opts" style="display:none">
        <label class="control-label">Positions</label>
        <input type="number" id="track-positions" value="24" min="6" max="64">
      </div>

      <div class="control-group" id="pit-opts" style="display:none">
        <label class="control-label">Pits per side</label>
        <input type="number" id="pit-cols" value="6" min="3" max="12">
      </div>

      <div class="control-group">
        <label class="control-label">Surface</label>
        <select id="surface-select">
          <option value="wood-classic">Wood Classic</option>
          <option value="wood-light">Wood Light</option>
          <option value="parchment">Parchment</option>
          <option value="earth">Earth</option>
          <option value="felt-green">Felt Green</option>
          <option value="slate">Slate</option>
          <option value="jungle">Jungle</option>
          <option value="military">Military</option>
          <option value="cosmic">Cosmic</option>
        </select>
      </div>

      <div class="control-group" id="cellcolor-group">
        <label class="control-label">Cell Style</label>
        <select id="cellcolor-select">
          <option value="checkered">Checkered</option>
          <option value="uniform">Uniform</option>
          <option value="none">None (lines only)</option>
        </select>
      </div>

      <div class="control-group">
        <label class="control-label">Labels</label>
        <select id="labels-select">
          <option value="true">Show</option>
          <option value="false">Hide</option>
        </select>
      </div>

      <div class="control-group">
        <label class="control-label">Piece Set</label>
        <select id="pieceset-select">
          <option value="">None</option>
        </select>
      </div>

      <div class="control-group" id="piece-palette" style="display:none">
        <label class="control-label">Place Piece <span id="active-piece-label"></span></label>
        <div class="piece-picker" id="piece-picker"></div>
        <button class="btn btn-outline" id="clear-pieces-btn" style="margin-top:8px;font-size:11px">Clear all pieces</button>
      </div>

      <div class="control-group" style="margin-top:16px">
        <label class="control-label">Export</label>
        <div class="control-row">
          <button class="btn btn-outline" id="export-yaml-btn">YAML</button>
          <button class="btn btn-outline" id="export-svg-btn">SVG</button>
        </div>
      </div>

    </div>
  </aside>

  <main class="boards-canvas">
    <div class="canvas-viewport" id="board-viewport">
      <div class="canvas-svg" id="board-svg"></div>
    </div>
    <div class="hex-info-bar" id="hex-info-bar">
      <span class="info-text" id="info-text">Configure board and click cells to place pieces</span>
      <span class="info-actions">
        <button class="info-btn" id="bar-undo-btn">Undo</button>
      </span>
    </div>
  </main>
</div>
